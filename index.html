document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

l }}\u003c/span\u003e\n      \u003c/sc-for\u003e\n      \u003ca href=\"https://modrinth.com/user/FirestormFMD\" target=\"_blank\" style=\"font-size:13.5px;color:#7fc08a;text-decoration:none\"\u003eModrinth ↗\u003c/a\u003e\n    \u003c/nav\u003e\n  \u003c/header\u003e\n  \u003cdiv style=\"height:2px;background:linear-gradient(90deg,rgba(88,168,221,0.55),rgba(143,119,214,0.55),rgba(88,168,221,0) 85%)\"\u003e\u003c/div\u003e\n\n  \u003c!-- ================= HOME (1a body) ================= --\u003e\n  \u003csc-if value=\"{{ onHome }}\" hint-placeholder-val=\"{{ true }}\"\u003e\n  \u003cmain data-screen-label=\"Home\" style=\"flex:1;padding:64px 36px 48px;max-width:820px;margin:0 auto;width:100%;box-sizing:border-box\"\u003e\n    \u003cdiv style=\"text-align:{{ siteAlign }};display:flex;flex-direction:column;align-items:{{ siteAlignItems }};gap:18px\"\u003e\n      \u003cimg src=\"5d34f3c5-85c0-482b-bcd4-b8f3a88ec34c\" alt=\"FMD logo\" style=\"width:64px;height:64px;border-radius:14px;animation:fmdSlideIn .6s cubic-bezier(.2,.8,.3,1) both\"\u003e\n      \u003ch1 style=\"margin:0;font-size:{{ siteTitleSize }}px;color:{{ siteTitleColor }};font-weight:700;letter-spacing:-0.02em;animation:fmdSlideIn .6s cubic-bezier(.2,.8,.3,1) both;animation-delay:.08s\"\u003e{{ siteTitle }}\u003c/h1\u003e\n      \u003cp style=\"margin:0;font-size:{{ siteTaglineSize }}px;color:{{ siteTaglineColor }};max-width:460px;line-height:1.55;animation:fmdSlideIn .6s cubic-bezier(.2,.8,.3,1) both;animation-delay:.16s\"\u003e{{ siteTagline }}\u003c/p\u003e\n      \u003cdiv style=\"display:flex;gap:12px;margin-top:10px;animation:fmdSlideIn .6s cubic-bezier(.2,.8,.3,1) both;animation-delay:.24s\"\u003e\n        \u003cspan data-fx=\"voxel\" onclick=\"{{ navDownloads }}\" style=\"background:linear-gradient(100deg,#4f9ed4,#7e68c9);color:#0f141b;font-weight:600;font-size:14px;padding:11px 22px;border-radius:8px;cursor:pointer\"\u003eDownload latest\u003c/span\u003e\n        \u003cspan onclick=\"{{ navUpdates 3c/div\u003e\n        \u003cdiv style=\"font-size:12.5px;color:#8b95a5;margin-top:6px;line-height:1.5\"\u003eOfficial project pages on Modrinth.\u003c/div\u003e\n      \u003c/a\u003e\n    \u003c/div\u003e\n  \u003c/main\u003e\n  \u003c/sc-if\u003e\n\n  \u003c!-- ================= DOWNLOADS ================= --\u003e\n  \u003csc-if value=\"{{ onDownloads }}\" hint-placeholder-val=\"{{ false }}\"\u003e\n  \u003cmain data-screen-label=\"Downloads\" style=\"flex:1;padding:56px 36px 48px;max-width:820px;margin:0 auto;width:100%;box-sizing:border-box;animation:fmdFadeUp 0.5s ease both\"\u003e\n\n    \u003c!-- ===== Mod list (default view) ===== --\u003e\n    \u003csc-if value=\"{{ showModList }}\" hint-placeholder-val=\"{{ true }}\"\u003e\n    \u003cdiv\u003e\n      \u003ch1 style=\"margin:0;font-size:30px;font-weight:700;letter-spacing:-0.02em\"\u003eDownloads\u003c/h1\u003e\n      \u003cp style=\"margin:10px 0 0;font-size:14.5px;color:#8b95a5;line-height:1.55\"\u003ePick a mod to see its versions, changelogs and required mods. Everything is also on \u003ca href=\"https://modrinth.com/user/FirestormFMD\" target=\"_blank\" style=\"color:#7fc08a;text-decoration:none\"\u003eModrinth ↗\u003c/a\u003e.\u003c/p\u003e\n      \u003cdiv style=\"display:flex;flex-direction:column;gap:12px;margin-top:36px\"\u003e\n        \u003csc-for list=\"{{ mods }}\" as=\"mod\" hint-placeholder-count=\"3\"\u003e\n          \u003cdiv onclick=\"{{ mod.open }}\" style=\"background:#212833;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:18px 22px;display:flex;align-items:center;gap:18px;cursor:pointer\" style-hover=\"border-color:rgba(88,168,221,0.4)\"\u003e\n            \u003cdiv style=\"width:46px;height:46px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-family:\u0027JetBrains Mono\u0027,monospace;font-size:15px;font-weight:500;color:{{ mod.iconColor }};background:{{ mod.iconBg }};border:1px solid {{ mod.iconBorder }}\"\u003e{{ mod.initials }}\u003c/div\u003e\n            \u003cdiv style=\"flex:1;min-width:0\"\u003e\n              \u003cdiv style=\"display:flex;align-items:center;gap:9px\"\u003e\n                \u003cspan style=\"font-size:15.5px;font-weight:600;color:#dee4ec\"\u003e{{ mod.name }}\u003c/span\u003e\n                \u003cspan style=\"font-family:\u0027JetBrains Mono\u0027,monospace;font-size:11px;color:#9ecbe8;background:rgba(88,168,221,0.1);border-radius:5px;padding:2px 7px\"\u003e{{ mod.latest }}\u003c/span\u003e\n              \u003c/div\u003e\n              \u003cdiv style=\"font-size:13px;color:#8b95a5;margin-top:5px;line-height:1.5\"\u003e{{ mod.desc }}\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv style=\"text-align:right;flex:none\"\u003e\n              \u003cdiv style=\"font-size:12px;color:#5f6875;font-family:\u0027JetBrains Mono\u0027,monospace\"\u003e{{ mod.mcRange }}\u003c/div\u003e\n              \u003cdiv style=\"font-size:12.5px;color:#58a8dd;margin-top:6px\"\u003eView downloads →\u003c/div\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/sc-for\u003e\n      \u003c/div\u003e\n\n      \u003c!-- ===== Modpacks ===== --\u003e\n      \u003cdiv style=\"margin-top:44px\"\u003e\n        \u003ch2 style=\"margin:0;font-size:20px;font-weight:700;letter-spacing:-0.01em\"\u003eModpacks\u003c/h2\u003e\n        \u003cp style=\"margin:8px 0 0;font-size:13.5px;color:#8b95a5;line-height:1.55\"\u003eReady-made bundles of my mods with sensible defaults — drop one in and play.\u003c/p\u003e\n        \u003cdiv style=\"display:flex;flex-direction:column;gap:12px;margin-top:20px\"\u003e\n          \u003csc-for list=\"{{ modpacks }}\" as=\"pack\" hint-placeholder-count=\"2\"\u003e\n            \u003cdiv style=\"background:#212833;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:18px 22px;display:flex;align-items:center;gap:18px\" style-hover=\"border-color:rgba(88,168,221,0.4)\"\u003e\n              \u003cdiv style=\"width:46px;height:46px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-family:\u0027JetBrains Mono\u0027,monospace;font-size:15px;font-weight:500;color:{{ pack.iconColor }};background:{{ pack.iconBg }};border:1px solid {{ pack.iconBorder }}\"\u003e{{ pack.initials }}\u003c/div\u003e\n              \u003cdiv style=\"flex:1;min-width:0\"\u003e\n                \u003cdiv style=\"display:flex;align-items:center;gap:9px\"\u003e\n                  \u003cspan style=\"font-size:15.5px;font-weight:600;color:#dee4ec\"\u003e{{ pack.name }}\u003c/span\u003e\n                  \u003cspan style=\"font-family:\u0027JetBrains Mono\u0027,monospace;font-size:11px;color:#9ecbe8;background:rgba(88,168,221,0.1);border-radius:5px;padding:2px 7px\"\u003e{{ pack.version }}\u003c/span\u003e\n                \u003c/div\u003e\n                \u003cdiv style=\"font-size:13px;color:#8b95a5;margin-top:5px;line-height:1.5\"\u003e{{ pack.desc }}\u003c/div\u003e\n                \u003cdiv style=\"font-size:12px;color:#5f6875;margin-top:7px\"\u003eIncludes {{ pack.includesText }}\u003c/div\u003e\n              \u003c/div\u003e\n              \u003cdiv style=\"text-align:right;flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:9px\"\u003e\n                \u003cdiv style=\"font-size:12px;color:#5f6875;font-family:\u0027JetBrains Mono\u0027,monospace\"\u003e{{ pack.mcRange }}\u003c/div\u003e\n                \u003csc-if value=\"{{ pack.hasFile }}\"\u003e\u003ca data-fx=\"voxel\" href=\"{{ pack.file }}\" download style=\"border:1px solid rgba(88,168,221,0.35);color:#9ecbe8;font-size:12px;padding:6px 14px;border-radius:7px;cursor:pointer;text-decoration:none;display:inline-block\"\u003eDownload\u003c/a\u003e\u003c/sc-if\u003e\n                \u003csc-if value=\"{{ pack.noFile }}\"\u003e\u003cspan style=\"font-size:12px;color:#5f6875\"\u003eNo file yet\u003c/span\u003e\u003c/sc-if\u003e\n              \u003c/div\u003e\n            \u003c/div\u003e\n          \u003c/sc-for\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003c/sc-if\u003e\n\n    \u003c!-- ===== Single mod downloads ===== --\u003e\n    \u003csc-if value=\"{{ showModDetail }}\" hint-placeholder-val=\"{{ false }}\"\u003e\n    \u003cdiv\u003e\n    \u003cspan onclick=\"{{ backToMods }}\" style=\"font-size:13px;color:#8b95a5;cursor:pointer\"\u003e← All mods\u003c/span\u003e\n    \u003cdiv style=\"display:flex;align-items:center;gap:16px;margin-top:16px\"\u003e\n      \u003cdiv style=\"width:52px;height:52px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-family:\u0027JetBrains Mono\u0027,monospace;font-size:17px;font-weight:500;color:{{ activeMod.iconColor }};background:{{ activeMod.iconBg }};border:1px solid {{ activeMod.iconBorder }}\"\u003e{{ activeMod.initials }}\u003c/div\u003e\n      \u003cdiv\u003e\n        \u003ch1 style=\"margin:0;font-size:28px;font-weight:700;letter-spacing:-0.02em\"\u003e{{ activeMod.name }}\u003c/h1\u003e\n        \u003cp style=\"margin:6px 0 0;font-size:13.5px;color:#8b95a5;line-height:1.5\"\u003e{{ activeMod.desc }}\u003c/p\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- Featured latest --\u003e\n    \u003cdiv style=\"margin-top:28px;background:#212833;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:26px 28px\"\u003e\n      \u003cdiv style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap\"\u003e\n        \u003cspan style=\"font-family:\u0027JetBrains Mono\u0027,monospace;font-size:16px;font-weight:500;color:#9ecbe8\"\u003e{{ activeMod.featured.v }}\u003c/span\u003e\n        \u003cspan style=\"font-size:11px;font-family:\u0027JetBrains Mono\u0027,monospace;color:#7fc08a;border:1px solid rgba(127,192,138,0.3);border-radius:4px;padding:2px 7px\"\u003eLATEST\u003c/span\u003e\n        \u003cspan style=\"font-size:12.5px;color:#8b95a5\"\u003eMC {{ activeMod.featured.mc }} · {{ activeMod.featured.loader }} · {{ activeMod.featured.date }}\u003c/span\u003e\n        \u003cspan style=\"margin-left:auto;display:flex;align-items:center;gap:10px\"\u003e\n          \u003cspan style=\"font-size:12px;color:#5f6875;font-family:\u0027JetBrains Mono\u0027,monospace\"\u003e{{ activeMod.featured.size }}\u003c/span\u003e\n          \u003csc-if value=\"{{ activeMod.featured.hasFile }}\"\u003e\u003ca data-fx=\"voxel\" href=\"{{ activeMod.featured.file }}\" download style=\"background:linear-gradient(100deg,#4f9ed4,#7e68c9);color:#0f141b;font-weight:600;font-size:13.5px;padding:10px 20px;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-block\"\u003eDownload .jar\u003c/a\u003e\u003c/sc-if\u003e\n          \u003csc-if value=\"{{ activeMod.featured.noFile }}\"\u003e\u003cspan style=\"font-size:12px;color:#5f6875;white-space:nowrap\"\u003eNo file yet\u003c/span\u003e\u003c/sc-if\u003e\n        \u003c/span\u003e\n      \u003c/div\u003e\n      \u003cdiv style=\"display:grid;grid-template-columns:1fr 260px;gap:28px;margin-top:22px\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv style=\"font-size:12px;font-weight:600;color:#8b95a5;text-transform:uppercase;letter-spacing:0.07em\"\u003eChangelog\u003c/div\u003e\n          \u003cul style=\"margin:10px 0 0;padding-left:18px;font-size:13.5px;color:#c6cdd8;line-height:1.75\"\u003e\n            \u003csc-for list=\"{{ activeMod.featured.notes }}\" as=\"note\" hint-placeholder-count=\"3\"\u003e\u003cli\u003e{{ note }}\u003c/li\u003e\u003c/sc-for\u003e\n          \u003c/ul\u003e\n        \u003c/div\u003e\n        \u003cdiv\u003e\n          \u003cdiv style=\"font-size:12px;font-weight:600;color:#8b95a5;text-transform:uppercase;letter-spacing:0.07em\"\u003eRequired mods\u003c/div\u003e\n          \u003cdiv style=\"display:flex;flex-direction:column;gap:8px;margin-top:10px\"\u003e\n            \u003csc-for list=\"{{ activeMod.featured.deps }}\" as=\"dep\" hint-placeholder-count=\"2\"\u003e\n              \u003cdiv style=\"display:flex;justify-content:space-between;font-size:13px\"\u003e\u003cspan style=\"color:#c6cdd8\"\u003e{{ dep.name }}\u003c/span\u003e\u003cspan style=\"font-family:\u0027JetBrains Mono\u0027,monospace;color:#8b95a5;font-size:12px\"\u003e{{ dep.ver }}\u003c/span\u003e\u003c/div\u003e\n            \u003c/sc-for\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- Archive --\u003e\n    \u003cdiv style=\"margin-top:44px\"\u003e\n      \u003cdiv style=\"font-size:12px;font-weight:600;color:#8b95a5;text-transform:uppercase;letter-spacing:0.07em\"\u003ePrevious versions\u003c/div\u003e\n      \u003cdiv style=\"margin-top:12px;border:1px solid rgba(255,255,255,0.07);border-radius:10px;overflow:hidden\"\u003e\n        \u003csc-for list=\"{{ activeMod.versions }}\" as=\"ver\" hint-placeholder-count=\"5\"\u003e\n          \u003cdiv style=\"border-bottom:1px solid rgba(255,255,255,0.06)\"\u003e\n            \u003cdiv style=\"display:flex;align-items:center;gap:18px;padding:14px 20px;cursor:pointer\" style-hover=\"background:rgba(255,255,255,0.02)\" onclick=\"{{ ver.toggle }}\"\u003e\n              \u003cspan style=\"font-family:\u0027JetBrains Mono\u0027,monospace;font-size:13px;color:#9ecbe8;min-width:64px\"\u003e{{ ver.v }}\u003c/span\u003e\n              \u003cspan style=\"font-size:12.5px;color:#8b95a5;min-width:130px\"\u003eMC {{ ver.mc }}\u003c/span\u003e\n              \u003cspan style=\"font-size:12.5px;color:#8b95a5\"\u003e{{ ver.date }}\u003c/span\u003e\n              \u003cspan style=\"margin-left:auto;font-size:12px;color:#5f6875;font-family:\u0027JetBrains Mono\u0027,monospace\"\u003e{{ ver.size }}\u003c/span\u003e\n              \u003cspan style=\"font-size:12.5px;color:#58a8dd\"\u003e{{ ver.chevron }} Changelog\u003c/span\u003e\n              \u003csc-if value=\"{{ ver.hasFile }}\"\u003e\u003ca data-fx=\"voxel\" href=\"{{ ver.file }}\" download onclick=\"{{ ver.stop }}\" style=\"border:1px solid rgba(88,168,221,0.35);color:#9ecbe8;font-size:12px;padding:6px 14px;border-radius:7px;cursor:pointer;text-decoration:none\"\u003eDownload\u003c/a\u003e\u003c/sc-if\u003e\n            \u003c/div\u003e\n            \u003csc-if value=\"{{ ver.open }}\" hint-placeholder-val=\"{{ false }}\"\u003e\n              \u003cdiv style=\"padding:4px 20px 18px 102px;display:grid;grid-template-columns:1fr 240px;gap:24px\"\u003e\n                \u003cul style=\"margin:0;padding-left:16px;font-size:13px;color:#c6cdd8;line-height:1.7\"\u003e\n                  \u003csc-for list=\"{{ ver.notes }}\" as=\"note\" hint-placeholder-count=\"2\"\u003e\u003cli\u003e{{ note }}\u003c/li\u003e\u003c/sc-for\u003e\n                \u003c/ul\u003e\n                \u003cdiv\u003e\n                  \u003cdiv style=\"font-size:11px;font-weight:600;color:#8b95a5;text-transform:uppercase;letter-spacing:0.07em\"\u003eRequired mods\u003c/div\u003e\n                  \u003cdiv style=\"display:flex;flex-direction:column;gap:6px;margin-top:8px\"\u003e\n                    \u003csc-for list=\"{{ ver.deps }}\" as=\"dep\" hint-placeholder-count=\"2\"\u003e\n                      \u003cdiv style=\"display:flex;justify-content:space-between;font-size:12.5px\"\u003e\u003cspan style=\"color:#c6cdd8\"\u003e{{ dep.name }}\u003c/span\u003e\u003cspan style=\"font-family:\u0027JetBrains Mono\u0027,monospace;color:#8b95a5;font-size:11.5px\"\u003e{{ dep.ver }}\u003c/span\u003e\u003c/div\u003e\n                    \u003c/sc-for\u003e\n                  \u003c/div\u003e\n                \u003c/div\u003e\n              \u003c/div\u003e\n            \u003c/sc-if\u003e\n          \u003c/div\u003e\n        \u003c/sc-for\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003c/div\u003e\n    \u003c/sc-if\u003e\n  \u003c/main\u003e\n  \u003c/sc-if\u003e\n\n  \u003c!-- ================= BUG TRACKER ================= --\u003e\n  \u003csc-if value=\"{{ onBugs }}\" hint-placeholder-val=\"{{ false }}\"\u003e\n  \u003cmain data-screen-label=\"Bug Tracker\" style=\"flex:1;padding:56px 36px 48px;max-width:820px;margin:0 auto;width:100%;box-sizing:border-box;animation:fmdFadeUp 0.5s ease both\"\u003e\n    \u003cdiv style=\"display:flex;align-items:flex-start;gap:16px\"\u003e\n      \u003cdiv\u003e\n        \u003ch1 style=\"margin:0;font-size:30px;font-weight:700;letter-spacing:-0.02em\"\u003eBug Tracker\u003c/h1\u003e\n        \u003cp style=\"margin:10px 0 0;font-size:14.5px;color:#8b95a5;line-height:1.55\"\u003eKnown issues across all mods. Check here before reporting a duplicate.\u003c/p\u003e\n      \u003c/div\u003e\n      \u003cspan data-fx=\"voxel\" style=\"margin-left:auto;background:linear-gradient(100deg,#4f9ed4,#7e68c9);color:#0f141b;font-weight:600;font-size:13.5px;padding:10px 20px;border-radius:8px;cursor:pointer;white-space:nowrap\"\u003eReport a bug\u003c/span\u003e\n    \u003c/div\u003e\n    \u003cdiv style=\"display:flex;gap:8px;margin-top:32px\"\u003e\n      \u003csc-for list=\"{{ bugFilters }}\" as=\"f\" hint-placeholder-count=\"4\"\u003e\n        \u003cspan onclick=\"{{ f.click }}\" style=\"font-size:12.5px;padding:6px 14px;border-radius:99px;cursor:pointer;border:1px solid {{ f.border }};color:{{ f.color }};background:{{ f.bg }}\"\u003e{{ f.label }}\u003c/span\u003e\n      \u003c/sc-for\u003e\n    \u003c/div\u003e\n    \u003cdiv style=\"margin-top:16px;border:1px solid rgba(255,255,255,0.07);border-radius:10px;overflow:hidden\"\u003e\n      \u003csc-for list=\"{{ bugs }}\" as=\"bug\" hint-placeholder-count=\"6\"\u003e\n        \u003cdiv style=\"display:flex;align-items:center;gap:16px;padding:15px 20px;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer\" style-hover=\"background:rgba(255,255,255,0.02)\"\u003e\n          \u003cspan style=\"font-family:\u0027JetBrains Mono\u0027,monospace;font-size:12px;color:#5f6875;min-width:44px\"\u003e{{ bug.id }}\u003c/span\u003e\n          \u003cspan style=\"font-size:13.5px;color:#dee4ec\"\u003e{{ bug.title }}\u003c/span\u003e\n          \u003cspan style=\"margin-left:auto;font-size:12px;color:#8b95a5;white-space:nowrap\"\u003e{{ bug.meta }}\u003c/span\u003e\n          \u003cspan style=\"font-size:11px;font-family:\u0027JetBrains Mono\u0027,monospace;padding:3px 9px;border-radius:99px;color:{{ bug.stColor }};background:{{ bug.stBg }};white-space:nowrap\"\u003e{{ bug.status }}\u003c/span\u003e\n        \u003c/div\u003e\n      \u003c/sc-for\u003e\n    \u003c/div\u003e\n  \u003c/main\u003e\n  \u003c/sc-if\u003e\n\n  \u003c!-- ================= SOURCE ================= --\u003e\n  \u003csc-if value=\"{{ onSource }}\" hint-placeholder-val=\"{{ false }}\"\u003e\n  \u003cmain data-screen-label=\"Source\" style=\"flex:1;padding:56px 36px 48px;max-width:820px;margin:0 auto;width:100%;box-sizing:border-box;animation:fmdFadeUp 0.5s ease both\"\u003e\n    \u003ch1 style=\"margin:0;font-size:30px;font-weight:700;letter-spacing:-0.02em\"\u003eSource\u003c/h1\u003e\n    \u003cp style=\"margin:10px 0 0;font-size:14.5px;color:#8b95a5;line-height:1.55\"\u003eRepositories and build files. Contributions and PRs welcome.\u003c/p\u003e\n    \u003cdiv style=\"display:flex;flex-direction:column;gap:14px;margin-top:36px\"\u003e\n      \u003csc-for list=\"{{ sourceLinks }}\" as=\"s\" hint-placeholder-count=\"3\"\u003e\n      \u003cdiv style=\"background:#212833;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:20px 24px;display:flex;align-items:center;gap:20px\"\u003e\n        \u003cdiv style=\"flex:1\"\u003e\n          \u003cdiv style=\"font-family:\u0027JetBrains Mono\u0027,monospace;font-size:14px;color:#9ecbe8\"\u003e{{ s.name }}\u003c/div\u003e\n          \u003cdiv style=\"font-size:13px;color:#8b95a5;margin-top:5px;line-height:1.5\"\u003e{{ s.desc }}\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cspan style=\"font-size:11.5px;color:#8b95a5;font-family:\u0027JetBrains Mono\u0027,monospace\"\u003e{{ s.meta }}\u003c/span\u003e\n        \u003csc-if value=\"{{ s.hasUrl }}\"\u003e\u003ca data-fx=\"voxel\" href=\"{{ s.url }}\" target=\"_blank\" style=\"border:1px solid rgba(88,168,221,0.35);color:#9ecbe8;font-size:12.5px;padding:7px 16px;border-radius:7px;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block\"\u003eView repo ↗\u003c/a\u003e\u003c/sc-if\u003e\n        \u003csc-if value=\"{{ s.noUrl }}\"\u003e\u003cspan style=\"font-size:12px;color:#5f6875;white-space:nowrap\"\u003eNo link yet\u003c/span\u003e\u003c/sc-if\u003e\n      \u003c/div\u003e\n      \u003c/sc-for\u003e\n    \u003c/div\u003e\n  \u003c/main\u003e\n  \u003c/sc-if\u003e\n\n  \u003c!-- ================= WIPS ================= --\u003e\n  \u003csc-if value=\"{{ onWips }}\" hint-placeholder-val=\"{{ false }}\"\u003e\n  \u003cmain data-screen-label=\"WIPs\" style=\"flex:1;padding:56px 36px 48px;max-width:820px;margin:0 auto;width:100%;box-sizing:border-box;animation:fmdFadeUp 0.5s ease both\"\u003e\n    \u003cdiv style=\"display:flex;align-items:center;gap:10px\"\u003e\n      \u003ch1 style=\"margin:0;font-size:30px;font-weight:700;letter-spacing:-0.02em\"\u003eWork in progress\u003c/h1\u003e\n      \u003cspan style=\"font-size:10px;font-family:\u0027JetBrains Mono\u0027,monospace;color:#8f77d6;border:1px solid rgba(143,119,214,0.35);border-radius:4px;padding:2px 6px\"\u003eEXPERIMENTAL\u003c/span\u003e\n    \u003c/div\u003e\n    \u003cp style=\"margin:10px 0 0;font-size:14.5px;color:#8b95a5;line-height:1.55;max-width:560px\"\u003eUnfinished builds and ideas. Expect bugs — these are not release quality and may corrupt worlds. Back up before testing.\u003c/p\u003e\n    \u003cdiv style=\"display:flex;flex-direction:column;gap:14px;margin-top:36px\"\u003e\n      \u003csc-for list=\"{{ wips }}\" as=\"w\" hint-placeholder-count=\"2\"\u003e\n      \u003cdiv style=\"background:#212833;border:1px solid rgba(143,119,214,0.2);border-radius:10px;padding:22px 24px\"\u003e\n        \u003cdiv style=\"display:flex;align-items:center;gap:12px\"\u003e\n          \u003cspan style=\"font-size:15px;font-weight:600;color:#b3a1e6\"\u003e{{ w.name }}\u003c/span\u003e\n          \u003cspan style=\"font-size:12px;color:#8b95a5\"\u003e{{ w.tagline }}\u003c/span\u003e\n          \u003cspan style=\"margin-left:auto;font-family:\u0027JetBrains Mono\u0027,monospace;font-size:11.5px;color:#8b95a5\"\u003e{{ w.stage }} · {{ w.percent }}%\u003c/span\u003e\n        \u003c/div\u003e\n        \u003cdiv style=\"height:3px;border-radius:2px;background:rgba(255,255,255,0.06);margin-top:14px;overflow:hidden\"\u003e\u003cdiv style=\"width:{{ w.percent }}%;height:100%;background:linear-gradient(90deg,#4f9ed4,#8a6cd6)\"\u003e\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv style=\"display:flex;align-items:center;gap:14px;margin-top:14px\"\u003e\n          \u003cspan style=\"font-size:12.5px;color:#8b95a5;line-height:1.5;flex:1\"\u003e{{ w.note }}\u003c/span\u003e\n          \u003csc-if value=\"{{ w.hasFile }}\"\u003e\u003ca data-fx=\"voxel\" href=\"{{ w.file }}\" download style=\"border:1px solid rgba(143,119,214,0.35);color:#b3a1e6;font-size:12px;padding:6px 14px;border-radius:7px;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block\"\u003eTry preview\u003c/a\u003e\u003c/sc-if\u003e\n          \u003csc-if value=\"{{ w.noFile }}\"\u003e\u003cspan style=\"font-size:12px;color:#5f6875;white-space:nowrap\"\u003eNo build yet\u003c/span\u003e\u003c/sc-if\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n      \u003c/sc-for\u003e\n    \u003c/div\u003e\n  \u003c/main\u003e\n  \u003c/sc-if\u003e\n\n  \u003c!-- ================= UPDATES ================= --\u003e\n  \u003csc-if value=\"{{ onUpdates }}\" hint-placeholder-val=\"{{ false }}\"\u003e\n  \u003cmain data-screen-label=\"Updates\" style=\"flex:1;padding:56px 36px 48px;max-width:720px;margin:0 auto;width:100%;box-sizing:border-box;animation:fmdFadeUp 0.5s ease both\"\u003e\n    \u003ch1 style=\"margin:0;font-size:30px;font-weight:700;letter-spacing:-0.02em\"\u003eUpdates\u003c/h1\u003e\n    \u003cp style=\"margin:10px 0 0;font-size:14.5px;color:#8b95a5;line-height:1.55\"\u003eRelease notes and announcements.\u003c/p\u003e\n    \u003cdiv style=\"display:flex;flex-direction:column;margin-top:36px\"\u003e\n      \u003csc-for list=\"{{ updates }}\" as=\"u\" hint-placeholder-count=\"3\"\u003e\n      \u003cdiv style=\"padding:26px 0;border-top:1px solid rgba(255,255,255,0.07)\"\u003e\n        \u003cdiv style=\"display:flex;align-items:center;gap:12px\"\u003e\n          \u003cspan style=\"font-family:\u0027JetBrains Mono\u0027,monospace;font-size:12px;color:{{ u.tagColor }};background:{{ u.tagBg }};border-radius:5px;padding:3px 8px\"\u003e{{ u.tag }}\u003c/span\u003e\n          \u003cspan style=\"font-size:12px;color:#5f6875\"\u003e{{ u.date }}\u003c/span\u003e\n        \u003c/div\u003e\n        \u003ch2 style=\"margin:12px 0 0;font-size:18px;font-weight:600\"\u003e{{ u.title }}\u003c/h2\u003e\n        \u003cp style=\"margin:8px 0 0;font-size:13.5px;color:#8b95a5;line-height:1.6\"\u003e{{ u.body }}\u003c/p\u003e\n        \u003csc-if value=\"{{ u.hasLink }}\"\u003e\u003cspan onclick=\"{{ u.click }}\" style=\"display:inline-block;margin-top:12px;font-size:13px;color:#58a8dd;cursor:pointer\"\u003e{{ u.linkText }} →\u003c/span\u003e\u003c/sc-if\u003e\n      \u003c/div\u003e\n      \u003c/sc-for\u003e\n    \u003c/div\u003e\n  \u003c/main\u003e\n  \u003c/sc-if\u003e\n\n  \u003c!-- Footer (1c) --\u003e\n  \u003cfooter style=\"padding:18px 36px;font-size:12px;color:#5f6875;display:flex;justify-content:space-between\"\u003e\n    \u003cspan\u003e© 2026 {{ siteName }}\u003c/span\u003e\n    \u003ca href=\"https://modrinth.com/user/FirestormFMD\" target=\"_blank\" style=\"color:#5f6875;text-decoration:none\"\u003emodrinth.com/user/FirestormFMD\u003c/a\u003e\n  \u003c/footer\u003e\n\u003c/div\u003e\n\n\n\n\u003c/x-dc\u003e\n\u003cscript type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{}\"\u003e\nclass Component extends DCLogic {\n  state = { page: \"home\", selectedMod: null, openVersion: null, bugFilter: \"All\", remote: null };\n\n  componentDidMount() {\n    this._fx = {};\n    this._setupDotGrid();\n    this._setupHoverFx();\n    // Site content lives in data/mods.json (managed from admin.html).\n    // Cache-buster avoids the GitHub Pages 10-minute cache after an update.\n    fetch(\"data/mods.json?t=\" + Date.now())\n      .then(r =\u003e r.ok ? r.json() : null)\n      .then(d =\u003e {\n        if (!d) return;\n        // The page background sits behind the dot-grid canvas, so it can\u0027t be\n        // a template binding — apply it straight to \u003cbody\u003e.\n        if (d.site \u0026\u0026 d.site.bg) document.body.style.background = d.site.bg;\n        this.setState({ remote: d });\n      })\n      .catch(() =\u003e {});\n  }\n  componentWillUnmount() {\n    const f = this._fx || {};\n    if (f.raf) cancelAnimationFrame(f.raf);\n    if (f.canvas) f.canvas.remove();\n    window.removeEventListener(\"resize\", f.onResize);\n    window.removeEventListener(\"pointermove\", f.onMoveDoc);\n    window.removeEventListener(\"pointermove\", f.onHover);\n    window.removeEventListener(\"pointerout\", f.onOut);\n  }\n\n  _setupDotGrid() {\n    const canvas = document.createElement(\"canvas\");\n    canvas.style.cssText = \"position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:-1;opacity:1\";\n    document.body.appendChild(canvas);\n    const ctx = canvas.getContext(\"2d\");\n    const state = { mx: -9999, my: -9999, cx: -9999, cy: -9999, dpr: Math.min(window.devicePixelRatio || 1, 2) };\n    const gap = 26, R = 150;\n    const resize = () =\u003e {\n      state.dpr = Math.min(window.devicePixelRatio || 1, 2);\n      canvas.width = Math.floor(innerWidth * state.dpr);\n      canvas.height = Math.floor(innerHeight * state.dpr);\n      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);\n    };\n    resize();\n    const onMove = (e) =\u003e { state.mx = e.clientX; state.my = e.clientY; };\n    const onResize = () =\u003e resize();\n    window.addEventListener(\"pointermove\", onMove);\n    window.addEventListener(\"resize\", onResize);\n    const draw = () =\u003e {\n      // ease the glow center toward the cursor so it stays soft\n      state.cx += (state.mx - state.cx) * 0.12;\n      state.cy += (state.my - state.cy) * 0.12;\n      ctx.clearRect(0, 0, innerWidth, innerHeight);\n      const cols = Math.ceil(innerWidth / gap) + 1;\n      const rows = Math.ceil(innerHeight / gap) + 1;\n      for (let i = 0; i \u003c cols; i++) {\n        for (let j = 0; j \u003c rows; j++) {\n          const x = i * gap, y = j * gap;\n          const dx = x - state.cx, dy = y - state.cy;\n          const d = Math.hypot(dx, dy);\n          const base = 0.028;\n          if (d \u003e R) { ctx.fillStyle = \"rgba(120,150,180,\" + base + \")\"; ctx.fillRect(x, y, 1.4, 1.4); continue; }\n          const t = 1 - d / R;\n          const a = base + t * t * 0.55;\n          // blend blue -\u003e purple with distance for a subtle two-tone\n          const r = Math.round(88 + (143 - 88) * (1 - t));\n          const g = Math.round(168 + (119 - 168) * (1 - t));\n          const b = Math.round(221 + (214 - 221) * (1 - t));\n          const s = 1.4 + t * 1.6;\n          ctx.fillStyle = \"rgba(\" + r + \",\" + g + \",\" + b + \",\" + a.toFixed(3) + \")\";\n          ctx.fillRect(x - s / 2 + 0.7, y - s / 2 + 0.7, s, s);\n        }\n      }\n      this._fx.raf = requestAnimationFrame(draw);\n    };\n    this._fx.canvas = canvas;\n    this._fx.onResize = onResize;\n    this._fx.onMoveDoc = onMove;\n    this._fx.raf = requestAnimationFrame(draw);\n  }\n\n  _setupHoverFx() {\n    let hovered = null;\n    const findTarget = (node) =\u003e {\n      while (node \u0026\u0026 node !== document.body) {\n        if (node.nodeType === 1) {\n          // prefer an explicit fx button, else the element that OWNS cursor:pointer\n          // (cursor is inherited, so checking inline style avoids stopping on inner text)\n          if (node.dataset \u0026\u0026 node.dataset.fx) return node;\n          if (node.style \u0026\u0026 node.style.cursor === \"pointer\") return node;\n        }\n        node = node.parentElement;\n      }\n      return null;\n    };\n    const inflate = (el) =\u003e {\n      const cs = getComputedStyle(el);\n      if (cs.display === \"inline\") { el.dataset._disp = \"1\"; el.style.display = \"inline-block\"; }\n      el.style.transition = \"transform .18s cubic-bezier(.2,.8,.3,1)\";\n      el.style.willChange = \"transform\";\n      el.style.transform = \"scale(1.045)\";\n    };\n    const revert = (el) =\u003e {\n      el.style.transform = \"\";\n      if (el.dataset._disp) { el.style.display = \"\"; delete el.dataset._disp; }\n      this._removeVoxelGrid(el);\n    };\n    const onHover = (e) =\u003e {\n      const t = findTarget(e.target);\n      if (t === hovered) return;\n      if (hovered) revert(hovered);\n      hovered = t;\n      if (hovered) {\n        inflate(hovered);\n        if (hovered.dataset \u0026\u0026 hovered.dataset.fx === \"voxel\") this._voxelGrid(hovered);\n      }\n    };\n    const onOut = (e) =\u003e {\n      if (!e.relatedTarget \u0026\u0026 hovered) { revert(hovered); hovered = null; }\n    };\n    window.addEventListener(\"pointermove\", onHover);\n    window.addEventListener(\"pointerout\", onOut);\n    this._fx.onHover = onHover;\n    this._fx.onOut = onOut;\n  }\n\n  _voxelGrid(el) {\n    if (el._grid) return;\n    const cs = getComputedStyle(el);\n    if (cs.position === \"static\") { el.dataset._pos = \"1\"; el.style.position = \"relative\"; }\n    // clip the voxels to the button\u0027s own rounded shape, sitting just inside the outline\n    el.dataset._ovf = el.style.overflow || \"\";\n    el.style.overflow = \"hidden\";\n    const col = \"#ffffff\";\n    // white reads faint on the bright gradient buttons, so make it a bit stronger there\n    const isLight = /linear-gradient/.test(el.getAttribute(\"style\") || \"\");\n    const boost = isLight ? 1.7 : 1.0;\n    const r = el.getBoundingClientRect();\n    const pitch = 6, cell = 4;\n    const fillW = r.width * 0.42;              // voxels cover ~40% of the button, from the left\n    const cols = Math.max(2, Math.floor(fillW / pitch));\n    const rows = Math.max(1, Math.floor((r.height - 6) / pitch));\n    const padY = (r.height - rows * pitch) / 2;\n    const fireStart = Math.floor(cols * 0.75); // last 25% of the filled columns are fire\n    const grid = document.createElement(\"div\");\n    grid.style.cssText = \"position:absolute;inset:0;pointer-events:none;z-index:1\";\n    for (let c = 0; c \u003c cols; c++) {\n      const isFire = c \u003e= fireStart;\n      const hi = Math.min(0.55, (isFire ? 0.4 : 0.24) * boost);\n      const delay = c * 22;\n      for (let rr = 0; rr \u003c rows; rr++) {\n        const sq = document.createElement(\"div\");\n        sq.style.cssText = \"position:absolute;width:\" + cell + \"px;height:\" + cell + \"px;border-radius:1px;background:\" + col +\n          \";left:\" + (c * pitch + 3) + \"px;top:\" + (rr * pitch + padY) + \"px;opacity:0\";\n        grid.appendChild(sq);\n        if (isFire) {\n          // fire licks sideways (to the right) and keeps moving forever\n          const run = 9 + Math.random() * 11;\n          sq.animate(\n            [{ transform: \"translateX(0)\", opacity: hi }, { transform: \"translateX(\" + run.toFixed(1) + \"px)\", opacity: 0 }],\n            { duration: 520 + Math.random() * 460, iterations: Infinity, delay: Math.random() * 700, easing: \"linear\" }\n          );\n        } else {\n          // plain appear / disappear: constant colour, no motion, no eased transition\n          const onFrac = (0.4 + Math.random() * 0.3).toFixed(3);\n          sq.animate(\n            [{ opacity: hi, offset: 0 }, { opacity: hi, offset: onFrac }, { opacity: 0, offset: onFrac }, { opacity: 0, offset: 1 }],\n            { duration: 360 + Math.random() * 640, iterations: Infinity, delay: delay + Math.random() * 420, easing: \"linear\" }\n          );\n        }\n      }\n    }\n    el.appendChild(grid);\n    el._grid = grid;\n  }\n\n  _removeVoxelGrid(el) {\n    if (!el._grid) return;\n    el._grid.remove();\n    el._grid = null;\n    el.style.overflow = el.dataset._ovf || \"\";\n    delete el.dataset._ovf;\n    if (el.dataset._pos) { el.style.position = \"\"; delete el.dataset._pos; }\n  }\n\n  data() {\n    // All site content comes from data/mods.json; before it loads (or if it\n    // fails to load) every section just renders empty.\n    const empty = { mods: [], modpacks: [], wips: [], updates: [], bugs: [], source: [], site: {} };\n    return { ...empty, ...(this.state.remote || {}) };\n  }\n  renderVals() {\n    const page = this.state.page;\n    const go = (p) =\u003e () =\u003e this.setState({ page: p, selectedMod: null, openVersion: null });\n    const pages = [\n      [\"Home\", \"home\"], [\"Downloads\", \"downloads\"], [\"Bug Tracker\", \"bugs\"],\n      [\"Source\", \"source\"], [\"WIPs\", \"wips\"], [\"Updates\", \"updates\"]\n    ];\n    const navItems = pages.map(([label, key]) =\u003e ({\n      label,\n      color: page === key ? \"#dee4ec\" : \"#8b95a5\",\n      weight: page === key ? \"500\" : \"400\",\n      click: go(key)\n    }));\n\n    const d = this.data();\n    // Site-wide look \u0026 text, editable from admin.html (Site tab).\n    const site = {\n      name: \"FirestormFMD\",\n      title: \"FirestormFMD\",\n      tagline: \"Mods, tools and updates for Minecraft — everything beyond the Modrinth page lives here.\",\n      font: \"sans\", textColor: \"#dee4ec\",\n      titleColor: \"#dee4ec\", titleSize: 40,\n      taglineColor: \"#8b95a5\", taglineSize: 16,\n      align: \"center\",\n      ...(d.site || {})\n    };\n    const fontMap = {\n      sans: \"\u0027Instrument Sans\u0027,system-ui,sans-serif\",\n      mono: \"\u0027JetBrains Mono\u0027,monospace\",\n      serif: \"Georgia,\u0027Times New Roman\u0027,serif\",\n      system: \"system-ui,sans-serif\"\n    };\n    const alignItemsMap = { left: \"flex-start\", center: \"center\", right: \"flex-end\" };\n    const sourceLinks = (d.source || []).map(s =\u003e ({ ...s, hasUrl: !!s.url, noUrl: !s.url }));\n\n    const accents = {\n      blue: { iconColor: \"#9ecbe8\", iconBg: \"rgba(88,168,221,0.1)\", iconBorder: \"rgba(88,168,221,0.25)\" },\n      purple: { iconColor: \"#b3a1e6\", iconBg: \"rgba(143,119,214,0.12)\", iconBorder: \"rgba(143,119,214,0.28)\" }\n    };\n    // Normalise a downloadable thing: templates test hasFile/noFile to decide\n    // between a real \u003ca download\u003e link and a \"No file yet\" label.\n    const withFile = (o) =\u003e ({\n      notes: [], deps: [], ...o,\n      size: (o \u0026\u0026 o.size) || \"\",\n      file: (o \u0026\u0026 o.file) || \"\",\n      hasFile: !!(o \u0026\u0026 o.file),\n      noFile: !(o \u0026\u0026 o.file)\n    });\n    const mods = d.mods.map(m =\u003e {\n      const a = accents[m.accent] || accents.blue;\n      const f = m.featured || {};\n      return {\n        ...m, ...a,\n        latest: f.v || \"\",\n        mcRange: \"MC \" + (f.mc || \"?\"),\n        open: () =\u003e this.setState({ selectedMod: m.id, openVersion: null })\n      };\n    });\n    const modpacks = d.modpacks.map(p =\u003e {\n      const a = accents[p.accent] || accents.blue;\n      return { ...withFile(p), ...a, mcRange: \"MC \" + p.mc, includesText: (p.includes || []).join(\" · \") };\n    });\n    const selected = this.state.selectedMod;\n    const activeModRaw = d.mods.find(m =\u003e m.id === selected);\n    const activeMod = activeModRaw ? {\n      ...activeModRaw, ...(accents[activeModRaw.accent] || accents.blue),\n      featured: withFile(activeModRaw.featured || {}),\n      versions: (activeModRaw.versions || []).map(v =\u003e ({\n        ...withFile(v),\n        open: this.state.openVersion === v.v,\n        chevron: this.state.openVersion === v.v ? \"▾\" : \"▸\",\n        toggle: () =\u003e this.setState(s =\u003e ({ openVersion: s.openVersion === v.v ? null : v.v })),\n        stop: (e) =\u003e e.stopPropagation()\n      }))\n    } : null;\n\n    const wips = d.wips.map(w =\u003e ({ ...withFile(w), percent: Math.max(0, Math.min(100, Number(w.percent) || 0)) }));\n    const tagStyles = {\n      blue: { tagColor: \"#9ecbe8\", tagBg: \"rgba(88,168,221,0.1)\" },\n      purple: { tagColor: \"#b3a1e6\", tagBg: \"rgba(143,119,214,0.12)\" }\n    };\n    const updates = d.updates.map(u =\u003e ({\n      ...u,\n      ...(tagStyles[u.accent] || tagStyles.blue),\n      hasLink: !!u.link,\n      linkText: u.linkText || \"More\",\n      click: go(u.link || \"home\")\n    }));\n\n    const statusStyles = {\n      \"OPEN\": { c: \"#e0a86a\", b: \"rgba(224,168,106,0.12)\" },\n      \"IN PROGRESS\": { c: \"#9ecbe8\", b: \"rgba(88,168,221,0.12)\" },\n      \"FIXED\": { c: \"#7fc08a\", b: \"rgba(127,192,138,0.12)\" }\n    };\n    const filter = this.state.bugFilter;\n    const bugs = d.bugs\n      .filter(b =\u003e filter === \"All\" || b.status === filter.toUpperCase())\n      .map(b =\u003e {\n        const st = statusStyles[b.status] || statusStyles.OPEN;\n        return { ...b, stColor: st.c, stBg: st.b };\n      });\n    const bugFilters = [\"All\", \"Open\", \"In Progress\", \"Fixed\"].map(f =\u003e ({\n      label: f,\n      click: () =\u003e this.setState({ bugFilter: f }),\n      border: filter === f ? \"rgba(88,168,221,0.45)\" : \"rgba(255,255,255,0.1)\",\n      color: filter === f ? \"#9ecbe8\" : \"#8b95a5\",\n      bg: filter === f ? \"rgba(88,168,221,0.08)\" : \"transparent\"\n    }));\n\n    return {\n      onHome: page === \"home\", onDownloads: page === \"downloads\", onBugs: page === \"bugs\",\n      onSource: page === \"source\", onWips: page === \"wips\", onUpdates: page === \"updates\",\n      navHome: go(\"home\"), navDownloads: go(\"downloads\"), navBugs: go(\"bugs\"),\n      navSource: go(\"source\"), navWips: go(\"wips\"), navUpdates: go(\"updates\"),\n      navItems, bugs, bugFilters,\n      mods, modpacks, activeMod, wips, updates, sourceLinks,\n      siteName: site.name,\n      siteTitle: site.title,\n      siteTagline: site.tagline,\n      siteFont: fontMap[site.font] || fontMap.sans,\n      siteTextColor: site.textColor,\n      siteTitleColor: site.titleColor,\n      siteTitleSize: Number(site.titleSize) || 40,\n      siteTaglineColor: site.taglineColor,\n      siteTaglineSize: Number(site.taglineSize) || 16,\n      siteAlign: site.align,\n      siteAlignItems: alignItemsMap[site.align] || \"center\",\n      showModList: page === \"downloads\" \u0026\u0026 !activeMod,\n      showModDetail: page === \"downloads\" \u0026\u0026 !!activeMod,\n      backToMods: () =\u003e this.setState({ selectedMod: null, openVersion: null })\n    };\n  }\n}\n\u003c/script\u003e\n\n\n\u003c/body\u003e\u003c/html\u003e\n"</script>
